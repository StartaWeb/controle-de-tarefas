<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StartWeb — Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/login.css">

    <!-- Firebase v10 Compat CDN -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
</head>

<body class="login-body">
    <div class="login-bg-shape shape-1"></div>
    <div class="login-bg-shape shape-2"></div>

    <div class="login-container">
        <div class="login-header">
            <div class="login-logo">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 2L2 7l10 5 10-5-10-5z" />
                    <path d="M2 17l10 5 10-5" />
                    <path d="M2 12l10 5 10-5" />
                </svg>
            </div>
            <h1 class="login-title" id="form-title">Acesse sua conta</h1>
            <p class="login-subtitle" id="form-subtitle">Gerencie suas tarefas e prazos.</p>
        </div>

        <div id="auth-error" class="auth-error"></div>

        <!-- Formulário de Login -->
        <form id="login-form" class="login-form">
            <div class="form-group">
                <label class="form-label" for="login-email">E-mail</label>
                <input type="email" class="form-input" id="login-email" placeholder="Seu e-mail cadastrado" required>
            </div>
            <div class="form-group">
                <label class="form-label" for="login-password">Senha</label>
                <input type="password" class="form-input" id="login-password" placeholder="Sua senha" required>
            </div>
            <button type="submit" class="btn btn-primary login-btn" id="btn-login">
                Entrar no Sistema
            </button>
        </form>

        <!-- Formulário de Registro (Apenas primeiro uso) -->
        <form id="register-form" class="login-form" style="display: none;">
            <div class="form-group">
                <label class="form-label" for="reg-nome">Nome Completo</label>
                <input type="text" class="form-input" id="reg-nome" placeholder="Seu nome" required>
            </div>
            <div class="form-group">
                <label class="form-label" for="reg-email">E-mail</label>
                <input type="email" class="form-input" id="reg-email" placeholder="E-mail" required>
            </div>
            <div class="form-group">
                <label class="form-label" for="reg-password">Senha</label>
                <input type="password" class="form-input" id="reg-password" placeholder="Crie uma senha (mínimo 6 caracteres)" required>
            </div>
            <button type="submit" class="btn btn-success login-btn" id="btn-register">
                Criar Conta de Administrador
            </button>
            <div class="login-footer">
                <p>Já possui conta? <a href="#" id="link-login">Fazer Login</a></p>
            </div>
        </form>
    </div>

    <!-- Scripts -->
    <script src="js/utils.js?v=2"></script>
    <script src="js/firebase-db.js?v=2"></script>
    <script src="js/data.js?v=2"></script>
    <script src="js/auth.js?v=2"></script>
</body>

</html>
