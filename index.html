<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Sistema de Gerenciamento de Tarefas por Setor - Controle de prazos, pessoas e produtividade">
    <title>StartWeb — Gerenciamento de Tarefas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">

    <!-- Firebase v10 Compat CDN -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
</head>

<body>
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo">
                <div class="logo-icon">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 2L2 7l10 5 10-5-10-5z" />
                        <path d="M2 17l10 5 10-5" />
                        <path d="M2 12l10 5 10-5" />
                    </svg>
                </div>
                <span class="logo-text">StartWeb</span>
            </div>
        </div>

        <nav class="sidebar-nav">
            <a href="#" class="nav-item active" data-page="dashboard" id="nav-dashboard">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="7" height="7" />
                    <rect x="14" y="3" width="7" height="7" />
                    <rect x="14" y="14" width="7" height="7" />
                    <rect x="3" y="14" width="7" height="7" />
                </svg>
                <span>Dashboard</span>
            </a>
            <a href="#" class="nav-item" data-page="tarefas" id="nav-tarefas">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 11l3 3L22 4" />
                    <path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11" />
                </svg>
                <span>Tarefas</span>
            </a>
            <a href="#" class="nav-item" data-page="pessoas" id="nav-pessoas">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4-4v2" />
                    <circle cx="9" cy="7" r="4" />
                    <path d="M23 21v-2a4 4 0 00-3-3.87" />
                    <path d="M16 3.13a4 4 0 010 7.75" />
                </svg>
                <span>Pessoas</span>
            </a>
            <a href="#" class="nav-item" data-page="setores" id="nav-setores">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 3h7v7H3z" />
                    <path d="M14 3h7v7h-7z" />
                    <path d="M14 14h7v7h-7z" />
                    <path d="M3 14h7v7H3z" />
                </svg>
                <span>Setores</span>
            </a>
            <a href="#" class="nav-item" data-page="relatorios" id="nav-relatorios">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z" />
                    <polyline points="14 2 14 8 20 8" />
                    <line x1="16" y1="13" x2="8" y2="13" />
                    <line x1="16" y1="17" x2="8" y2="17" />
                    <polyline points="10 9 9 9 8 9" />
                </svg>
                <span>Relatórios</span>
            </a>
            <a href="#" class="nav-item" id="nav-logout" style="margin-top: 10px; color: var(--color-danger);">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                    <polyline points="16 17 21 12 16 7"></polyline>
                    <line x1="21" y1="12" x2="9" y2="12"></line>
                </svg>
                <span>Sair</span>
            </a>
        </nav>

        <div class="sidebar-footer">
            <div class="sidebar-clock" id="sidebar-clock"></div>
            <div class="sidebar-date" id="sidebar-date"></div>
            <div class="firebase-status" title="Status Firebase">
                <span id="connection-status" class="connection-dot" title="Sincronizando..."></span>
                <span class="firebase-label">Firebase</span>
            </div>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content" id="main-content">
        <!-- Top Bar -->
        <header class="topbar">
            <button class="menu-toggle" id="menu-toggle">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <line x1="3" y1="12" x2="21" y2="12" />
                    <line x1="3" y1="6" x2="21" y2="6" />
                    <line x1="3" y1="18" x2="21" y2="18" />
                </svg>
            </button>
            <div class="topbar-title" id="topbar-title">Dashboard</div>
            <div class="topbar-actions">
                <button class="btn btn-primary" id="btn-new-task" title="Nova Tarefa">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="12" y1="5" x2="12" y2="19" />
                        <line x1="5" y1="12" x2="19" y2="12" />
                    </svg>
                    <span>Nova Tarefa</span>
                </button>
            </div>
        </header>

        <!-- Page Container -->
        <div class="page-container">
            <!-- Dashboard Page -->
            <section class="page active" id="page-dashboard"></section>

            <!-- Tarefas Page -->
            <section class="page" id="page-tarefas"></section>

            <!-- Pessoas Page -->
            <section class="page" id="page-pessoas"></section>

            <!-- Setores Page -->
            <section class="page" id="page-setores"></section>

            <!-- Relatórios Page -->
            <section class="page" id="page-relatorios"></section>
        </div>

        <!-- Footer -->
        <footer class="app-footer" id="app-footer">
            <div class="footer-content">
                <div class="footer-brand">
                    <span class="footer-logo">StartWeb</span>
                    <span class="footer-separator">|</span>
                    <span class="footer-dev">Desenvolvido por <strong>Roberto Ursine</strong></span>
                </div>
                <div class="footer-contact">
                    <span>📞 (11) 98285-6216</span>
                </div>
            </div>
        </footer>
    </main>

    <!-- Modal Overlay -->
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal" id="modal">
            <div class="modal-header">
                <h2 class="modal-title" id="modal-title">Modal</h2>
                <button class="modal-close" id="modal-close">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18" />
                        <line x1="6" y1="6" x2="18" y2="18" />
                    </svg>
                </button>
            </div>
            <div class="modal-body" id="modal-body"></div>
            <div class="modal-footer" id="modal-footer"></div>
        </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toast-container"></div>

    <!-- Confirmation Dialog -->
    <div class="confirm-overlay" id="confirm-overlay">
        <div class="confirm-dialog">
            <div class="confirm-icon" id="confirm-icon">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10" />
                    <line x1="12" y1="8" x2="12" y2="12" />
                    <line x1="12" y1="16" x2="12.01" y2="16" />
                </svg>
            </div>
            <h3 class="confirm-title" id="confirm-title">Confirmar ação</h3>
            <p class="confirm-message" id="confirm-message">Tem certeza que deseja realizar esta ação?</p>
            <div class="confirm-actions">
                <button class="btn btn-ghost" id="confirm-cancel">Cancelar</button>
                <button class="btn btn-danger" id="confirm-ok">Confirmar</button>
            </div>
        </div>
    </div>


    <!-- Scripts -->
    <script src="js/utils.js?v=3"></script>
    <script src="js/firebase-db.js?v=3"></script>
    <script src="js/data.js?v=3"></script>
    <script src="js/dashboard.js?v=3"></script>
    <script src="js/pessoas.js?v=3"></script>
    <script src="js/tarefas.js?v=3"></script>
    <script src="js/setores.js?v=3"></script>
    <script src="js/relatorios.js?v=3"></script>
    <script src="js/app.js?v=3"></script>
</body>
</html>
